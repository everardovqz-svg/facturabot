{% extends "base.html" %}
{% block title %}Entrar — FacturaBot{% endblock %}
{% block content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;">
  <div style="width:100%;max-width:380px;">
    <div style="text-align:center;margin-bottom:2rem;">
      <div style="font-size:36px;margin-bottom:8px;">🧾</div>
      <h1 style="font-size:22px;font-weight:normal;letter-spacing:-0.5px;">FacturaBot</h1>
      <p style="font-family:monospace;font-size:13px;color:var(--muted);margin-top:4px;">Panel de facturación</p>
    </div>
    <div class="card">
      {% if error %}<div class="form-error">{{ error }}</div>{% endif %}
      <form method="post" action="/login">
        <div class="form-group">
          <label>Correo electrónico</label>
          <input type="email" name="email" placeholder="admin@tunegocio.com" required autofocus />
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" name="password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">
          Entrar →
        </button>
      </form>
    </div>
    <p style="text-align:center;font-family:monospace;font-size:12px;color:var(--muted);margin-top:1rem;">
      ¿Sin cuenta? <a href="/registro" style="color:var(--text);text-decoration:underline;">Regístrate</a>
    </p>
  </div>
</div>
{% endblock %}
